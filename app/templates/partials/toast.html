<div x-data="toast()" x-show="visible" x-transition.opacity
     class="fixed bottom-6 right-6 z-50 max-w-sm pointer-events-none">
    <div :class="type === 'error' ? 'bg-red-900/90 border-red-500/50' : 'bg-surface border-white/10'"
         class="pointer-events-auto rounded-xl border p-4 shadow-2xl backdrop-blur-xl animate-slide-up">
        <div class="flex items-start gap-3">
            <span x-show="type === 'success'" class="text-success text-lg">✓</span>
            <span x-show="type === 'error'" class="text-danger text-lg">✗</span>
            <div class="flex-1">
                <p x-text="message" class="text-sm"></p>
            </div>
            <button @click="hide()" class="text-text-muted hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>
</div>
